name: tests

on:
  push:
    branches: [main, cloud]
  pull_request:
    branches: [main, cloud]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint con ruff
        run: ruff check src tests

      - name: Tests unitarios
        run: pytest -q
