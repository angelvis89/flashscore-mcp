name: deploy-hfspace

# Despliega el subproyecto /cloud al Hugging Face Space configurado.
# Requiere secrets en GitHub:
#   HF_TOKEN       — token de acceso (perfil HF, write scope)
#   HF_SPACE_REPO  — formato "usuario/flashscore-mcp" (slug del Space)
on:
  push:
    branches: [cloud]
    paths:
      - "src/**"
      - "cloud/**"
      - "pyproject.toml"
      - ".github/workflows/deploy-hfspace.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar huggingface_hub
        run: pip install --upgrade huggingface_hub

      - name: Empaquetar contexto del Space
        run: |
          mkdir -p hf-space
          cp -r src hf-space/src
          cp cloud/Dockerfile hf-space/Dockerfile
          cp cloud/README.md hf-space/README.md
          cp pyproject.toml hf-space/pyproject.toml
          # README.md del proyecto raiz se omite; el del Space lleva el YAML.

      - name: Subir al Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          python <<'PY'
          import os
          from huggingface_hub import HfApi
          api = HfApi(token=os.environ["HF_TOKEN"])
          repo = os.environ["HF_SPACE_REPO"]
          api.upload_folder(
              folder_path="hf-space",
              repo_id=repo,
              repo_type="space",
              commit_message="auto-deploy desde GitHub Actions",
          )
          print(f"Deploy OK -> https://huggingface.co/spaces/{repo}")
          PY
