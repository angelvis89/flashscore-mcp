# fly.toml — plan B por si Hugging Face Spaces tiene problemas.
# NOTA: Fly.io exige tarjeta desde 2024 para nuevos usuarios. Solo usar si
# tienes cuenta legacy o aceptas el requisito.
app = "flashscore-mcp"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  MCP_TRANSPORT = "streamable-http"
  MCP_BIND_HOST = "0.0.0.0"
  MCP_BIND_PORT = "8000"
  FLASHSCORE_HEADLESS = "true"
  FLASHSCORE_MAX_CONCURRENT_PAGES = "2"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "20s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
